<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://use.typekit.net/qfa6gsf.css">
    <link rel="stylesheet" href="assets/css/styles.css">

    <title>Manzini Franquias</title>
    <link rel="icon" href="assets/img/favicon.png" sizes="192x192">
    
</head>
<body>
    <header>
        <div class="position-relative">
            <!-- Imagem de fundo -->
            <img src="assets/img/hero2.png" class="img-fluid w-100 d-none d-md-block bg-primary" alt="">
    
            <!-- Conteúdo sobre a imagem -->
            <div class="container position-absolute top-50 start-50 translate-middle">
                <div class="row d-flex justify-content-center align-items-center">
                    <!-- Conteúdo de texto -->
                    <div class="col-md-6 text-center text-md-start text-white">
                        <span class="bg-secondary px-4 py-2 rounded-3 text-uppercase">Faturamento médio anual R$3.5 milhões e lucratividade de 15%</span>
                        <h1 class="text-white lh-1 my-3 animate__animated animate__fadeIn fw-bold">Torne-se um franqueado da pizzaria que você confia!</h1>
                        <a href="" class="btn btn-lg btn-success">Quero saber mais</a>
                    </div>
    
                    <!-- Formulário -->
                    <div class="col-md-4">
                        <form id="form" action="" method="post">
                            <label class="lead-shark-label" for="nome">Nome:</label>
                            <input class="lead-shark-input form-control" type="text" id="name" name="name" required>
    
                            <label class="lead-shark-label" for="telefone">Telefone:</label>
                            <input class="lead-shark-input form-control" type="tel" id="phone" name="phone" minlength="14" maxlength="15" required placeholder="(__) _____-____">
    
                            <label class="lead-shark-label" for="email">Email:</label>
                            <input class="lead-shark-input form-control" type="email" id="email" name="email" required>
    
                            <div class="d-flex">
                                <div class="d-flex flex-column">
                                    <label class="lead-shark-label" for="cidade">Cidade:</label>
                                    <input class="lead-shark-input form-control" type="cidade" id="cidade" name="cidade" required>
                                </div>
    
                                <div class="d-flex flex-column">
                                    <label class="lead-shark-label" for="estado">Estado:</label>
                                    <input class="lead-shark-input form-control" type="estado" id="estado" name="estado" required>
                                </div>
                            </div>
    
                            <label class="lead-shark-label" for="investimento">Investimento:</label>
                            <select class="form-select" id="investimento" aria-label="Default select example">
                                <option selected>Open this select menu</option>
                                <option value="1">One</option>
                                <option value="2">Two</option>
                                <option value="3">Three</option>
                            </select>
    
                            <div class="lead-shark-text-end">
                                <button type="submit" class="lead-shark-button-send">Conversar no WhatsApp</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
    
            <!-- Navbar sobre a imagem -->
            <nav class="navbar navbar-expand-lg navbar-dark py-md-5 position-absolute w-100 top-0 animate__animated animate__fadeIn">
                <div class="container">
                    <a class="navbar-brand" href="">
                        <img src="assets/img/logo-manz.png" alt="Manzini Franquias">
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                        aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse text-sm-start justify-content-end rounded-bottom-4"
                        id="navbarText">
                        <ul class="navbar-nav fs-5">
                            <li class="nav-item"><a class="nav-link" href="">Início</a></li>
                            <li class="nav-item"><a class="nav-link" href="">Franqueado</a></li>
                            <li class="nav-item"><a class="nav-link" href="">Onde encontrar</a></li>
                            <li class="nav-item"><a class="nav-link" href="">Contato</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>
    

    <main>
        
    </main>

    <footer>

    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <script src="assets/js/scripts.js"></script>
</body>
</html>
